name: miningguard
description: AI-Powered Mining Safety Companion for Indian Mine Workers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  firebase_app_check: ^0.4.3

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.0

  # Local Storage
  hive_flutter: ^1.1.0

  # HTTP
  dio: ^5.4.1

  # Utilities
  intl: ^0.20.2
  logger: ^2.0.2+1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  timezone: ^0.9.4

  # Media
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  speech_to_text: '>=6.6.0 <8.0.0'
  record: ^6.0.0
  cached_network_image: ^3.3.1
  video_player: ^2.8.3

  # Connectivity & Offline
  connectivity_plus: ^6.0.3
  path_provider: ^2.1.5

  # Utilities
  timeago: ^3.6.1

  # UI
  flutter_svg: ^2.0.9
  lottie: ^3.1.0
  fl_chart: ^0.67.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  fake_cloud_firestore: ^4.1.0
  firebase_auth_mocks: ^0.15.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
